# cargo-audit configuration
# https://rustsec.org/

[advisories]
ignore = [
    # wasmtime vulns via extism 1.21.0 — no upstream fix; plugins feature-gated
    "RUSTSEC-2026-0006",  # wasmtime f64.copysign segfault on x86-64
    "RUSTSEC-2026-0020",  # WASI guest-controlled resource exhaustion
    "RUSTSEC-2026-0021",  # WASI http fields panic
    "RUSTSEC-2026-0085",  # wasmtime panic lifting flags component value
    "RUSTSEC-2026-0086",  # wasmtime host data leakage with 64-bit tables/Winch
    "RUSTSEC-2026-0087",  # wasmtime segfault with f64x2.splat on x86-64
    "RUSTSEC-2026-0088",  # wasmtime data leakage between pooling allocator instances
    "RUSTSEC-2026-0089",  # wasmtime panic in component model async
    "RUSTSEC-2026-0091",  # wasmtime OOB write transcoding component model strings
    "RUSTSEC-2026-0092",  # wasmtime component value lifting panic
    "RUSTSEC-2026-0093",  # wasmtime heap OOB read in UTF-16 transcoding
    "RUSTSEC-2026-0094",  # wasmtime improperly masked table.grow return with Winch
    "RUSTSEC-2026-0095",  # wasmtime Winch sandbox-escaping memory access
    "RUSTSEC-2026-0096",  # wasmtime aarch64 Cranelift sandbox escape
    # instant crate unmaintained — transitive dep via nostr; no upstream fix
    "RUSTSEC-2024-0384",
    # rustls-webpki 0.102.8 CRL matching — pinned by rumqttc 0.25; no upstream fix yet
    "RUSTSEC-2026-0049",
]
