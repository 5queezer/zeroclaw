name: Symbol Impact Analysis

on:
  pull_request:
    branches: [master]

jobs:
  impact:
    name: Cymbal Impact Analysis
    runs-on: ubuntu-latest
    # Informational only — never blocks the gate.
    continue-on-error: true
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull cymbal image
        run: docker pull ghcr.io/1broseidon/cymbal:latest

      - name: Analyse impact
        run: |
          cymbal() { docker run --rm -v "$PWD":/workspace ghcr.io/1broseidon/cymbal:latest "$@"; }

          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.rs')
          if [ -z "$CHANGED" ]; then
            echo "No Rust files changed."
            echo '[]' > impact-report.json
            exit 0
          fi

          # cymbal auto-indexes on first query — no explicit index step needed.
          SYMBOLS=$(echo "$CHANGED" \
            | xargs -I{} cymbal outline {} --json 2>/dev/null \
            | jq -r '.symbols[]?.name' 2>/dev/null \
            | sort -u)

          if [ -z "$SYMBOLS" ]; then
            echo "No symbols extracted from changed files."
            echo '[]' > impact-report.json
            exit 0
          fi

          echo "### Changed symbols"
          echo "$SYMBOLS"
          echo ""

          echo "$SYMBOLS" | xargs -r cymbal impact --json 2>/dev/null \
            | tee impact-report.json

          echo ""
          ENTRIES=$(jq 'length' impact-report.json 2>/dev/null || echo 0)
          echo "### $ENTRIES impact entries"

      - name: Upload impact report
        uses: actions/upload-artifact@v4
        with:
          name: cymbal-impact-report
          path: impact-report.json
          retention-days: 14
