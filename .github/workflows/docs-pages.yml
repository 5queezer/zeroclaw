name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/docs-pages.yml"
      - ".github/workflows/master-branch-flow.md"
      - "docs-pages/**"
      - "docs/**"
      - "README*.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "LICENSE*"
      - "NOTICE"
      - "assets/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Stage docs site source
        run: |
          rm -rf .pages-src .site
          mkdir -p .pages-src
          rsync -a --prune-empty-dirs \
            --include '*/' \
            --include '*.md' \
            --include '*.png' \
            --include '*.jpg' \
            --include '*.jpeg' \
            --include '*.gif' \
            --include '*.svg' \
            --include '*.webp' \
            --include '*.ico' \
            --exclude '*' \
            ./ .pages-src/
          cp docs-pages/_config.yml .pages-src/_config.yml
          cp docs-pages/index.md .pages-src/index.md
          cp docs-pages/CNAME .pages-src/CNAME

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: .pages-src
          destination: .site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v4
        with:
          path: .site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages site
        id: deployment
        uses: actions/deploy-pages@665fb3d9444228d7c3533b1c03d0b76a58b84a66 # v4
